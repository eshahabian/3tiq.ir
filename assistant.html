<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دستیار کوهنوردی | سه تیغ</title>
    <meta name="description" content="دستیار هوشمند کوهنوردی سه تیغ — سؤالات خود را درباره قله، مسیر، تجهیزات و ایمنی بپرسید">
    <link rel="canonical" href="https://3tiq.ir/assistant.html">
    <meta property="og:title" content="دستیار کوهنوردی | سه تیغ">
    <meta property="og:description" content="سؤال بپرس — قله، تجهیزات، مسیر و نکات ایمنی">
    <meta property="og:url" content="https://3tiq.ir/assistant.html">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="fa_IR">
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://cdn.fontcdn.ir/Font/Persian/Vazirmatn/Vazirmatn.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/i18n.css">
    <style>
        .assistant-page {
            min-height: calc(100vh - 5rem);
            display: flex;
            flex-direction: column;
            padding-top: 5.5rem;
        }
        .assistant-hero {
            text-align: center;
            padding: 3rem 1.25rem 2rem;
        }
        .assistant-badge {
            display: inline-block;
            background: rgba(212,165,116,.15);
            border: 1px solid rgba(212,165,116,.35);
            color: var(--primary-color);
            padding: .35rem 1rem;
            border-radius: 100px;
            font-size: .8rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }
        .assistant-hero h1 {
            font-size: clamp(1.75rem, 4vw, 2.5rem);
            font-weight: 900;
            margin-bottom: .75rem;
        }
        .assistant-hero p {
            color: var(--text-light);
            max-width: 32rem;
            margin: 0 auto;
            line-height: 1.8;
        }
        .assistant-shell {
            flex: 1;
            max-width: 52rem;
            width: 100%;
            margin: 0 auto 2rem;
            padding: 0 1rem;
            min-height: 32rem;
        }
        .assistant-frame {
            width: 100%;
            height: min(70vh, 640px);
            min-height: 480px;
            border: 1px solid rgba(212,165,116,.35);
            border-radius: 1rem;
            background: #f8fafc;
        }
        .assistant-offline {
            display: none;
            text-align: center;
            padding: 3rem 1.5rem;
            border: 2px dashed rgba(212,165,116,.45);
            border-radius: 1rem;
        }
        .assistant-offline.is-visible { display: block; }
    </style>
</head>
<body>

    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <a href="index.html">
                        <img src="logo.png" alt="سه تیغ" class="logo-img" style="height:70px;width:auto;">
                    </a>
                </div>
                <nav class="nav-menu" id="navMenu">
                    <ul>
                        <li><a href="index.html" data-i18n="nav.home">صفحه اصلی</a></li>
                        <li><a href="panahgah.html" data-i18n="nav.shelters">پناهگاه‌ها</a></li>
                        <li><a href="blog.html" data-i18n="nav.blog">وبلاگ</a></li>
                        <li><a href="assistant.html" class="active">دستیار</a></li>
                        <li><a href="index.html#contact" data-i18n="nav.contact">تماس با ما</a></li>
                    </ul>
                </nav>
                <div class="nav-overlay" id="navOverlay"></div>
                <div class="header-actions">
                    <div class="lang-switch" id="langSwitch" role="group" aria-label="Language">
                        <button type="button" class="lang-switch-btn active" data-lang="fa" aria-pressed="true">فا</button>
                        <button type="button" class="lang-switch-btn" data-lang="en" aria-pressed="false">EN</button>
                    </div>
                    <button class="theme-toggle" id="themeToggle" aria-label="تغییر تم">
                        <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/></svg>
                        <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    </button>
                    <button class="mobile-menu-toggle" id="mobileMenuToggle" aria-label="منو">
                        <span></span><span></span><span></span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="assistant-page">
        <section class="assistant-hero">
            <span class="assistant-badge">🤖 دستیار هوشمند</span>
            <h1 data-i18n="services.assistant.title">دستیار کوهنوردی</h1>
            <p data-i18n="services.assistant.desc">سؤال بپرس — قله، تجهیزات، مسیر و نکات ایمنی</p>
        </section>

        <div class="assistant-shell">
            <iframe
                id="assistantFrame"
                class="assistant-frame"
                title="دستیار کوهنوردی سه‌تیغ"
                allow="clipboard-write"
                loading="eager"
            ></iframe>
            <div id="assistantOffline" class="assistant-offline" role="alert">
                <h2>دستیار در دسترس نیست</h2>
                <p>سرور چت (<code>npm run dev</code> در پوشه <code>coding-tutor</code>) اجرا نشده.</p>
                <p style="margin-top:1rem">
                    <a href="http://localhost:3000/embed" target="_blank" rel="noopener" class="btn btn-primary">باز کردن چت مستقیم ←</a>
                </p>
                <a href="index.html#services" class="btn btn-primary" style="margin-top:1rem;display:inline-block">← بازگشت</a>
            </div>
        </div>
    </main>

    <script>
    (function () {
        var host = location.hostname;
        var chatBase = (host === 'localhost' || host === '127.0.0.1')
            ? 'http://localhost:3000'
            : (window.ASSISTANT_CHAT_URL || 'https://assistant.3tiq.ir');
        var frame = document.getElementById('assistantFrame');
        var offline = document.getElementById('assistantOffline');

        frame.src = chatBase + '/embed';

        frame.addEventListener('load', function () {
            offline.classList.remove('is-visible');
            frame.style.display = 'block';
        });

        // فقط اگر iframe واقعاً لود نشد (نه CORS — چک fetch قبلی iframe سالم را مخفی می‌کرد)
        setTimeout(function () {
            try {
                var doc = frame.contentDocument || frame.contentWindow.document;
                if (doc && doc.body && doc.body.innerHTML.length > 0) return;
            } catch (e) {
                // cross-origin = iframe loaded from another port — OK
                return;
            }
            showOffline();
        }, 12000);

        function showOffline() {
            frame.style.display = 'none';
            offline.classList.add('is-visible');
        }
    })();
    </script>

    <script src="js/i18n-boot.js" defer></script>
    <script src="js/i18n.js" defer></script>
    <script src="js/site-chrome.js" defer></script>
    <script src="js/app.js" defer></script>
</body>
</html>
