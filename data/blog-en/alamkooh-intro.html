<p>At 4,850 m, Alam-Kuh's north face is one of the most famous big walls in Iranian mountaineering.</p>
<h2 id="route">Hesarchal route</h2>
<p>From Tehran to Kelardasht, then Shirpla and Hesarchal. A typical ascent takes 2 days.</p>
<h2 id="level">Difficulty</h2>
<p>For experienced mountaineers. Technical gear may be required on some sections.</p>
